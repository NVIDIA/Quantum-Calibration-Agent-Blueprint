instances:
  - url: https://nvidia-q-c-a.docs.buildwithfern.com/quantum-calibration-agent
    custom-domain: docs.nvidia.com/quantum-calibration-agent

title: NVIDIA Quantum Calibration Agent Blueprint

footer: ./components/CustomFooter.tsx

layout:
  searchbar-placement: header
  page-width: 1376px
  sidebar-width: 248px
  content-width: 812px
  tabs-placement: header
  hide-feedback: true

colors:
  accentPrimary:
    dark: '#76B900'
    light: '#76B900'
  background:
    light: '#FFFFFF'
    dark: '#000000'

theme:
  page-actions: toolbar
  footer-nav: minimal

logo:
  dark: ./assets/NVIDIA_dark.svg
  light: ./assets/NVIDIA_light.svg
  height: 20
  href: /

favicon: ./assets/NVIDIA_symbol.svg

js:
- url: https://assets.adobedtm.com/5d4962a43b79/c1061d2c5e7b/launch-191c2462b890.min.js
  strategy: beforeInteractive

css:
- ./main.css

navbar-links:
- type: github
  value: https://github.com/NVIDIA/Quantum-Calibration-Agent-Blueprint

experimental:
  mdx-components:
  - ./components
  basepath-aware: true

products:
  - display-name: Quantum Calibration Agent Blueprint
    slug: /
    path: latest.yml
    versions:
      - display-name: Latest
        path: latest.yml
        slug: latest

redirects:
  # Generated by utils/generate_redirects.py — re-run from repo root; see scripts README
  - source: "/index.html"
    destination: "/latest"
  - source: "/index"
    destination: "/latest"
  - source: "/latest/:path*/index.html"
    destination: "/latest/:path*"
  - source: "/:path*/index.html"
    destination: "/:path*"
  # Sphinx page URLs (foo.html); must follow all :path*/index.html rules above
  - source: "/:path*.html"
    destination: "/:path*"
