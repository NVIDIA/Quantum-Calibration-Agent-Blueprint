general:
  front_end:
    _type: fastapi
    host: "0.0.0.0"
    port: 8000
    workers: 1
    reload: true
    workflow:
      method: "POST"
      description: "Deep Agent workflow with filesystem and shell tools"
      path: "/generate"
      websocket_path: "/websocket"
      openai_api_path: "/chat"
      openai_api_v1_path: "/v1/chat/completions"

# VLM (Vision Language Model) configuration
vlm:
  provider: "nvidia"
  model: "google/gemma-4-31b-it"
  api_key_env: "NVIDIA_API_KEY"
  temperature: 0
  max_tokens: 16384

